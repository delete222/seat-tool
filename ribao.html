<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日通报</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F7F9FB;
            margin: 0;
            padding: 20px;
            color: #333333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        h1 { text-align: center; color: #333333; margin-bottom: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        th, td { border: 1px solid #000000; padding: 8px 6px; text-align: center; }
        th { background-color: #4A90E2; color: #ffffff; }
        .date-cell { background-color: #ffffff !important; min-width: 70px; }
        .reception-cell { min-width: 140px; }
        .leader-cell { width: 150px; word-wrap: break-word; word-break: break-all; }
        .overall-journey-cell { width: 250px; word-wrap: break-word; word-break: break-all; }
        textarea {
            width: 100%; height: 150px; padding: 10px;
            border-radius: 4px; border: 1px solid #cccccc;
            box-sizing: border-box; resize: vertical;
        }
        .container { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .container > div { width: 48%; }
        label { font-weight: bold; color: #333333; display: block; margin-bottom: 5px; }
        .section-title {
            background-color: #E1E8ED; padding: 10px; border: 1px solid #dddddd;
            text-align: left; font-size: 16px; font-weight: bold; color: #333333;
        }
        button {
            padding: 10px 20px; border: none; border-radius: 4px;
            background-color: #4A90E2; color: white; font-size: 14px;
            cursor: pointer; transition: background-color 0.3s; margin: 4px;
        }
        button:hover { background-color: #357ABD; }
        button:focus { outline: none; }
        #form { text-align: center; margin-bottom: 20px; }
        #report {
            background-color: #ffffff; padding: 20px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); flex: 1; overflow-x: auto;
        }
        .button-group { display: flex; justify-content: center; flex-wrap: wrap; }
        .bg-s td:not(.date-cell) { background-color: #ACD6FF; }
        .bg-vip td:not(.date-cell) { background-color: #FF9797; }
        .bg-top td:not(.date-cell) { background-color: #FFD700; }
        .version-info { text-align: center; font-size: 1.6vmin; color: #888; background-color: rgba(255,255,255,0.8); padding: 10px 0; width: 100%; }
        .line-count { font-size: 12px; color: #888; margin-top: 4px; }
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .toast { padding: 10px 20px; border-radius: 6px; color: #fff; font-size: 14px; animation: toastIn 0.3s ease; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
        .toast-success { background-color: #52c41a; }
        .toast-error { background-color: #f5222d; }
        .toast-warning { background-color: #fa8c16; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
        .spinner { width: 36px; height: 36px; border: 4px solid #e0e0e0; border-top-color: #4A90E2; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .version-toggle { text-align: center; margin-bottom: 10px; }
        .version-toggle button { background-color: #888; }
        .version-toggle button.active { background-color: #4A90E2; }
        #old-version-frame { width: 100%; border: none; display: none; flex: 1; min-height: 90vh; }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .container > div { width: 100%; margin-bottom: 10px; }
            table { font-size: 12px; }
            .button-group { gap: 4px; }
        }
    </style>
</head>
<body>
    <div class="version-toggle">
        <button id="btn-new-ver" class="active">新版</button>
        <button id="btn-old-ver">旧版</button>
    </div>
    <div id="new-version">
    <h1>每日通报</h1>
    <div class="toast-container" id="toast-container"></div>
    <form id="form">
        <div class="container">
            <div>
                <label for="hangzhou">杭州客户粘贴区</label>
                <textarea id="hangzhou" placeholder="请输入杭州客户数据"></textarea>
                <div class="line-count" id="hangzhou-count"></div>
            </div>
            <div>
                <label for="beijing">北京客户粘贴区</label>
                <textarea id="beijing" placeholder="请输入北京客户数据"></textarea>
                <div class="line-count" id="beijing-count"></div>
            </div>
        </div>
        <div class="button-group">
            <button type="button" id="btn-generate">生成通报</button>
            <button type="button" id="btn-copy">一键复制</button>
            <button type="button" id="btn-copy-img">一键复制图片</button>
            <button type="button" id="btn-pdf">导出PDF</button>
            <button type="button" id="btn-clear">清空</button>
        </div>
    </form>
    <div id="report"></div>
    <div class="version-info">© Steve  本工具总访问量 <span id="busuanzi_value_page_pv"></span> 次</div>
    </div>
    <iframe id="old-version-frame"></iframe>

    <script>
    (function() {
        'use strict';
        const CONFIG = {
            SORT_FIELDS: { hangzhou: '杭州展厅', beijing: '望京展厅' },
            FUTURE_FACTORY: '未来工厂',
            LEVEL_ORDER: ['TOP', 'VIP', 'S', 'A+', 'A'],
            HEADERS: ['日期','客户单位','行业','陪同领导','人数','级别','办事处陪同人','接待信息','接待时间','接待员','整体行程'],
            STORAGE: { hangzhou: 'ribao_hangzhou', beijing: 'ribao_beijing' }
        };
        function debounce(fn, delay) {
            let timer;
            return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
        }
        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }
        function showLoading(message) {
            const overlay = document.createElement('div');
            overlay.className = 'loading-overlay';
            overlay.id = 'loading-overlay';
            overlay.innerHTML = '<div class="spinner"></div><div>' + (message || '处理中...') + '</div>';
            document.body.appendChild(overlay);
        }
        function hideLoading() { const el = document.getElementById('loading-overlay'); if (el) el.remove(); }
        function updateLineCount(id) {
            const text = document.getElementById(id).value;
            const lines = text.split('\n').filter(l => l.split('\t').length >= 13);
            document.getElementById(id + '-count').textContent = lines.length ? '已输入 ' + lines.length + ' 条有效数据' : '';
        }
        function parseData(data, sortField) {
            let lines = data.split('\n').filter(line => line.trim() !== '');
            let parsedData = {};
            lines.forEach(line => {
                let fields = line.split('\t');
                if (fields.length >= 13) {
                    const date = fields[0];
                    if (!parsedData[date]) parsedData[date] = [];
                    parsedData[date].push({
                        日期: fields[0], 客户单位: fields[1], 行业: fields[2],
                        陪同领导: fields[3], 人数: fields[4], 级别: fields[5],
                        办事处陪同人: fields[6], 接待信息: fields[7],
                        接待时间: fields[8] ? fields[8].replace(/：/g, ':') : '/',
                        接待员: fields[9] || '/', 其它字段1: fields[10] || '/',
                        其它字段2: fields[11] || '/', 整体行程: fields[12] || '/'
                    });
                }
            });
            for (let date in parsedData) {
                parsedData[date].sort((a, b) => {
                    let aPlaces = a['接待信息'].split('/'), bPlaces = b['接待信息'].split('/');
                    let aTimes = a['接待时间'].split('/'), bTimes = b['接待时间'].split('/');
                    let aIdx = aPlaces.indexOf(sortField), bIdx = bPlaces.indexOf(sortField);
                    let aFIdx = aPlaces.indexOf(CONFIG.FUTURE_FACTORY);
                    let bFIdx = bPlaces.indexOf(CONFIG.FUTURE_FACTORY);
                    let aTime = aIdx !== -1 ? aTimes[aIdx] : '24:00';
                    let bTime = bIdx !== -1 ? bTimes[bIdx] : '24:00';
                    let aFTime = aFIdx !== -1 ? aTimes[aFIdx] : '24:00';
                    let bFTime = bFIdx !== -1 ? bTimes[bFIdx] : '24:00';
                    if (aIdx !== -1 && bIdx !== -1) return aTime.localeCompare(bTime, 'zh-CN', { numeric: true });
                    if (aIdx !== -1) return -1;
                    if (bIdx !== -1) return 1;
                    return aFTime.localeCompare(bFTime, 'zh-CN', { numeric: true });
                });
            }
            return parsedData;
        }
        function countLevels(data) {
            let counts = { TOP: 0, VIP: 0, S: 0, 'A+': 0, A: 0 };
            data.forEach(entry => { if (counts.hasOwnProperty(entry['级别'])) counts[entry['级别']]++; });
            return CONFIG.LEVEL_ORDER.map(l => counts[l] > 0 ? l + ' ' + counts[l] + '批' : '').filter(e => e).join('、');
        }
        function getChineseDayOfWeek(dateString) {
            const map = ['周日','周一','周二','周三','周四','周五','周六'];
            return map[new Date(dateString.replace(/年|月/g, '-').replace('日', '')).getDay()];
        }
        function formatDate(date) {
            let parts = date.split('-');
            return parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
        }
        function generateSectionTitle(title, date, totalBatches, levelCounts) {
            let dow = getChineseDayOfWeek(date);
            let fd = formatDate(date.replace(/年|月/g, '-').replace('日', ''));
            let tr = document.createElement('tr');
            let th = document.createElement('th');
            th.colSpan = 11; th.classList.add('section-title');
            th.textContent = title + '： ' + fd + '（' + dow + '）共' + totalBatches + '批，其中：' + levelCounts;
            tr.appendChild(th); return tr;
        }
        function generateTableHeader() {
            let headRow = document.createElement('tr');
            CONFIG.HEADERS.forEach(header => {
                let th = document.createElement('th'); th.textContent = header;
                if (header === '陪同领导') th.classList.add('leader-cell');
                else if (header === '整体行程') th.classList.add('overall-journey-cell');
                headRow.appendChild(th);
            });
            return headRow;
        }
        function getReportDateRange(d1, d2) {
            let dates = [...Object.keys(d1), ...Object.keys(d2)];
            if (!dates.length) return null;
            dates.sort((a, b) => new Date(a) - new Date(b));
            return formatDate(dates[0].replace(/年|月/g,'-').replace('日','')) + '-' + formatDate(dates[dates.length-1].replace(/年|月/g,'-').replace('日',''));
        }
        let reportDateRange = null;
        function generateReport() {
            let hangzhouData = document.getElementById('hangzhou').value;
            let beijingData = document.getElementById('beijing').value;
            if (!hangzhouData.trim() && !beijingData.trim()) { showToast('请先粘贴客户数据', 'error'); return; }
            let parsedH = parseData(hangzhouData, CONFIG.SORT_FIELDS.hangzhou);
            let parsedB = parseData(beijingData, CONFIG.SORT_FIELDS.beijing);
            let totalEntries = Object.values(parsedH).flat().length + Object.values(parsedB).flat().length;
            let totalLines = (hangzhouData + '\n' + beijingData).split('\n').filter(l => l.trim()).length;
            let skipped = totalLines - totalEntries;
            if (skipped > 0) showToast(skipped + ' 行数据格式不正确已跳过', 'warning');
            let reportDiv = document.getElementById('report');
            reportDiv.innerHTML = '';
            let table = document.createElement('table');
            let tbody = document.createElement('tbody');
            function appendData(data, sectionTitle) {
                for (let date in data) {
                    let lc = countLevels(data[date]), tb = data[date].length;
                    tbody.appendChild(generateSectionTitle(sectionTitle, date, tb, lc));
                    tbody.appendChild(generateTableHeader());
                    let dateCell = document.createElement('td');
                    dateCell.classList.add('date-cell'); dateCell.rowSpan = tb;
                    dateCell.innerHTML = date.split('年')[1] + '<br />（' + getChineseDayOfWeek(date) + '）<br />' + tb + '批';
                    data[date].forEach((entry, index) => {
                        let row = document.createElement('tr');
                        if (index === 0) row.appendChild(dateCell);
                        ['客户单位','行业','陪同领导','人数','级别','办事处陪同人','接待信息','接待时间','接待员','整体行程'].forEach(key => {
                            let td = document.createElement('td');
                            td.textContent = entry[key] || '/';
                            if (key === '陪同领导') td.classList.add('leader-cell');
                            if (key === '接待信息') td.classList.add('reception-cell');
                            if (key === '整体行程') td.classList.add('overall-journey-cell');
                            row.appendChild(td);
                        });
                        if (entry['级别'] === 'S') row.classList.add('bg-s');
                        else if (entry['级别'] === 'VIP') row.classList.add('bg-vip');
                        else if (entry['级别'] === 'TOP') row.classList.add('bg-top');
                        tbody.appendChild(row);
                    });
                }
            }
            appendData(parsedH, '杭州接待信息通报');
            appendData(parsedB, '北京接待信息通报');
            table.appendChild(tbody); reportDiv.appendChild(table);
            reportDateRange = getReportDateRange(parsedH, parsedB);
            showToast('通报生成成功');
        }
        async function copyToClipboard() {
            const reportDiv = document.getElementById('report');
            if (!reportDiv.innerHTML.trim()) { showToast('请先生成通报', 'error'); return; }
            try {
                const blob = new Blob([reportDiv.innerHTML], { type: 'text/html' });
                await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]);
                showToast('已复制到剪贴板');
            } catch (e) { showToast('复制失败: ' + e.message, 'error'); }
        }
        async function copyTableAsImage() {
            const reportDiv = document.getElementById('report');
            if (!reportDiv.innerHTML.trim()) { showToast('请先生成通报', 'error'); return; }
            try {
                showLoading('正在生成图片...');
                const canvas = await html2canvas(reportDiv, { scale: 2 });
                const blob = await new Promise(resolve => canvas.toBlob(resolve));
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                showToast('表格已复制为图片');
            } catch (e) { showToast('复制图片失败: ' + e.message, 'error'); }
            finally { hideLoading(); }
        }
        async function exportPDF() {
            const reportDiv = document.getElementById('report');
            if (!reportDiv.innerHTML.trim()) { showToast('请先生成通报', 'error'); return; }
            try {
                showLoading('正在生成PDF...');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const canvas = await html2canvas(reportDiv, { scale: 2 });
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const imgWidth = 210, imgHeight = (canvas.height * imgWidth) / canvas.width;
                let heightLeft = imgHeight, position = 0;
                pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                heightLeft -= 297;
                while (heightLeft >= 0) {
                    position = heightLeft - imgHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                    heightLeft -= 297;
                }
                pdf.save(reportDateRange ? reportDateRange + '客户信息通报.pdf' : '客户信息通报.pdf');
                showToast('PDF已导出');
            } catch (e) { showToast('PDF导出失败: ' + e.message, 'error'); }
            finally { hideLoading(); }
        }
        function clearAll() {
            document.getElementById('hangzhou').value = '';
            document.getElementById('beijing').value = '';
            document.getElementById('report').innerHTML = '';
            localStorage.removeItem(CONFIG.STORAGE.hangzhou);
            localStorage.removeItem(CONFIG.STORAGE.beijing);
            updateLineCount('hangzhou'); updateLineCount('beijing');
            reportDateRange = null; showToast('已清空');
        }
        const hangzhouEl = document.getElementById('hangzhou');
        const beijingEl = document.getElementById('beijing');
        hangzhouEl.value = localStorage.getItem(CONFIG.STORAGE.hangzhou) || '';
        beijingEl.value = localStorage.getItem(CONFIG.STORAGE.beijing) || '';
        updateLineCount('hangzhou'); updateLineCount('beijing');
        const saveH = debounce(() => localStorage.setItem(CONFIG.STORAGE.hangzhou, hangzhouEl.value), 500);
        const saveB = debounce(() => localStorage.setItem(CONFIG.STORAGE.beijing, beijingEl.value), 500);
        hangzhouEl.addEventListener('input', () => { saveH(); updateLineCount('hangzhou'); });
        beijingEl.addEventListener('input', () => { saveB(); updateLineCount('beijing'); });
        document.getElementById('btn-generate').addEventListener('click', generateReport);
        document.getElementById('btn-copy').addEventListener('click', copyToClipboard);
        document.getElementById('btn-copy-img').addEventListener('click', copyTableAsImage);
        document.getElementById('btn-pdf').addEventListener('click', exportPDF);
        document.getElementById('btn-clear').addEventListener('click', clearAll);
    })();
    </script>
